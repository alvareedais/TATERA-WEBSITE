<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATERA - Profil Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'tatera-green': '#115E28',
                        'tatera-light-green': '#39B54A',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans h-screen flex overflow-hidden">

    <div class="w-64 bg-white p-6 flex flex-col justify-between h-screen flex-shrink-0 relative z-10 border-r border-gray-200">
        <div>
            <div class="flex items-center gap-3 mb-8 pl-2">
                <div class="w-12 h-12 bg-gray-300 rounded-full flex-shrink-0 flex items-center justify-center text-gray-600">
                    <i class="fa-solid fa-user-shield text-xl"></i>
                </div>
                <div>
                    <h3 id="sidebar-username" class="font-bold text-gray-800 text-sm">Hi, Super Admin</h3>
                    <p class="text-[11px] text-gray-400 font-medium">Super Administrator</p>
                </div>
            </div>

            <nav class="space-y-1 text-xs font-bold text-gray-700">
                <a href="dashboard-admin.html" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-gray-100 transition">
                    <i class="fa-solid fa-house w-5 text-center text-sm"></i> <span>Dashboard</span>
                </a>

                <a href="manajemen-admin.html" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-gray-100 transition">
                    <i class="fa-solid fa-user-gear w-5 text-center text-sm"></i> <span>Manajemen Admin</span>
                </a>

                <a href="manajemen-petani-admin.html" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-gray-100 transition">
                    <i class="fa-solid fa-users w-5 text-center text-sm"></i> <span>Manajemen Petani</span>
                </a>

                <a href="musim-tanam-admin.html" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-gray-100 transition">
                    <i class="fa-solid fa-seedling w-5 text-center text-sm"></i> <span>Musim Tanam</span>
                </a>

                <a href="keuangan-admin.html" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-gray-100 transition">
                    <i class="fa-solid fa-dollar-sign w-5 text-center text-sm"></i> <span>Keuangan</span>
                </a>

                <a href="laporan-admin.html" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-gray-100 transition">
                    <i class="fa-solid fa-file-lines w-5 text-center text-sm"></i> <span>Laporan</span>
                </a>

                <a href="pengaturan-sistem-admin.html" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-gray-100 transition">
                    <i class="fa-solid fa-gear w-5 text-center text-sm"></i> <span>Pengaturan Sistem</span>
                </a>
                
                <a href="notifikasi-admin.html" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-gray-100 transition">
                    <i class="fa-solid fa-bell w-5 text-center text-sm"></i> <span>Notifikasi</span>
                </a>
                
                <a href="profil-admin.html" class="flex items-center space-x-3 p-3 rounded-xl bg-blue-500 text-white shadow-sm transition">
                    <i class="fa-solid fa-user w-5 text-center text-sm"></i> <span>Profil</span>
                </a>
            </nav>
        </div>

        <div>
            <button onclick="handleLogout()" class="w-full flex items-center gap-2 px-4 py-2.5 rounded-xl bg-red-100 text-red-600 font-bold hover:bg-red-200 transition text-xs">
                <i class="fa-solid fa-power-off text-sm"></i> <span>Logout</span>
            </button>
        </div>
    </div>

    <div class="flex-grow p-8 h-screen overflow-y-auto flex items-center justify-center bg-gray-300">
        <div class="bg-white rounded-3xl shadow-lg w-full max-w-4xl overflow-hidden h-[90vh] flex flex-col justify-between relative">
            
            <div>
                <div class="bg-blue-500 h-56 w-full relative flex flex-col items-center justify-center text-white">
                    <div class="w-24 h-24 bg-gray-300 rounded-full border-4 border-white flex items-center justify-center text-gray-500 shadow-md mb-2">
                        <i class="fa-solid fa-user text-4xl"></i>
                    </div>
                    <h2 class="text-xl font-bold tracking-wide" id="profile-card-name">Super Admin</h2>
                    <p class="text-xs text-blue-100 font-medium">Super Administrator</p>
                </div>

                <div class="p-8 max-w-xl mx-auto space-y-6 text-sm font-medium text-gray-700">
                    <div>
                        <span class="block text-gray-800 font-bold mb-1">Nama Lengkap</span>
                        <p id="txt-nama" class="text-gray-500 font-semibold pl-1">-</p>
                    </div>
                    
                    <div>
                        <span class="block text-gray-800 font-bold mb-1">Email</span>
                        <p id="txt-email" class="text-gray-500 font-semibold pl-1">-</p>
                    </div>

                    <div>
                        <span class="block text-gray-800 font-bold mb-1">No. Telepon</span>
                        <p id="txt-telp" class="text-gray-500 font-semibold pl-1">-</p>
                    </div>

                    <div>
                        <span class="block text-gray-800 font-bold mb-1">Alamat</span>
                        <p id="txt-alamat" class="text-gray-500 font-semibold pl-1">-</p>
                    </div>

                    <div>
                        <span class="block text-gray-800 font-bold mb-1">Bergabung Pada</span>
                        <p id="txt-joined" class="text-gray-500 font-semibold pl-1">-</p>
                    </div>
                </div>
            </div>

            <div class="p-6 text-center border-t border-gray-100">
                <button onclick="bukaModalEdit()" class="w-full max-w-md mx-auto py-2.5 px-6 border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-bold rounded-xl text-xs shadow-sm transition">
                    Edit Profil
                </button>
            </div>

        </div>
    </div>

    <div id="modal-edit-profil" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in duration-200">
            <div class="bg-tatera-green p-4 text-white flex items-center justify-between">
                <h3 class="font-bold text-sm"><i class="fa-solid fa-user-pen mr-1"></i> Perbarui Profil Admin</h3>
                <button onclick="tutupModalEdit()" class="hover:text-gray-200 text-lg">&times;</button>
            </div>
            <form onsubmit="simpanPerubahanProfil(event)" class="p-6 space-y-4 text-xs font-semibold text-gray-700">
                <div>
                    <label class="block text-gray-600 mb-1">Nama Lengkap</label>
                    <input type="text" id="input-nama" required class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:outline-none focus:border-tatera-green">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1">Email</label>
                    <input type="email" id="input-email" required class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:outline-none focus:border-tatera-green">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1">No. Telepon</label>
                    <input type="text" id="input-telp" required class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:outline-none focus:border-tatera-green">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1">Alamat</label>
                    <textarea id="input-alamat" required rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:outline-none focus:border-tatera-green font-sans resize-none"></textarea>
                </div>
                <div class="flex items-center justify-end gap-2 pt-2">
                    <button type="button" onclick="tutupModalEdit()" class="px-4 py-2 border border-gray-300 bg-white hover:bg-gray-50 rounded-xl transition text-gray-700">Batal</button>
                    <button type="submit" class="px-4 py-2 bg-tatera-green hover:bg-emerald-800 text-white rounded-xl transition shadow-sm">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            muatDataProfil();
        });

        function muatDataProfil() {
            // Mengambil data dari localStorage atau menggunakan nilai default bawaan visual
            const namaSesi = localStorage.getItem('user_nama_lengkap') || "Super Admin";
            const emailSesi = localStorage.getItem('user_email') || "Superadmin@gmail.com";
            const telpSesi = localStorage.getItem('user_telepon') || "0812-3456-7890";
            const alamatSesi = localStorage.getItem('user_alamat') || "Jl. Pembangunan No. 45, Jakarta Pusat";
            const joinedSesi = localStorage.getItem('user_joined') || "20 Mei 2026";

            // Tampilkan ke komponen teks halaman utama
            if (document.getElementById('sidebar-username')) {
                document.getElementById('sidebar-username').innerText = "Hi, " + namaSesi;
            }
            document.getElementById("profile-card-name").innerText = namaSesi;
            document.getElementById("txt-nama").innerText = namaSesi;
            document.getElementById("txt-email").innerText = emailSesi;
            document.getElementById("txt-telp").innerText = telpSesi;
            document.getElementById("txt-alamat").innerText = alamatSesi;
            document.getElementById("txt-joined").innerText = joinedSesi;
        }

        function bukaModalEdit() {
            // Masukkan data teks aktif saat ini ke dalam kolom input form modal
            document.getElementById("input-nama").value = document.getElementById("txt-nama").innerText;
            document.getElementById("input-email").value = document.getElementById("txt-email").innerText;
            document.getElementById("input-telp").value = document.getElementById("txt-telp").innerText;
            document.getElementById("input-alamat").value = document.getElementById("txt-alamat").innerText;

            // Munculkan kontainer modal
            document.getElementById("modal-edit-profil").classList.remove("hidden");
        }

        function tutupModalEdit() {
            document.getElementById("modal-edit-profil").classList.add("hidden");
        }

        function simpanPerubahanProfil(event) {
            event.preventDefault();

            // Tangkap nilai modifikasi baru dari form modal
            const namaBaru = document.getElementById("input-nama").value;
            const emailBaru = document.getElementById("input-email").value;
            const telpBaru = document.getElementById("input-telp").value;
            const alamatBaru = document.getElementById("input-alamat").value;

            // Rekam ke dalam basis data lokal browser (localStorage)
            localStorage.setItem('user_nama_lengkap', namaBaru);
            localStorage.setItem('user_email', emailBaru);
            localStorage.setItem('user_telepon', telpBaru);
            localStorage.setItem('user_alamat', alamatBaru);

            // Perbarui antarmuka teks halaman dan tutup modal popup
            muatDataProfil();
            tutupModalEdit();

            alert("Profil administrator berhasil diperbarui!");
        }

        function handleLogout() {
            if (confirm("Yakin ingin keluar dari panel admin?")) {
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
