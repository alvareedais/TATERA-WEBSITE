    <div class="flex-1 p-8 overflow-y-auto">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm max-w-4xl mx-auto p-10 min-h-[85vh]">
            <div class="border-b border-gray-100 pb-4 mb-8 flex justify-between items-center">

                    <h3 class="text-xl font-bold text-gray-800 mt-2">Notifikasi</h3>
                </div>
                <button onclick="tandaiSemuaSelesai()" class="text-xs font-bold text-green-600 hover:text-green-700 transition">Tandai semua dibaca</button>
            </div>

            <div id="list-notifikasi" class="space-y-4">
                </div>

    <script>
        // Fungsi pemicu dropdown
        function toggleMenu(menuId, arrowId) {
            const menu = document.getElementById(menuId);
            const arrow = document.getElementById(arrowId);
            if (menu && arrow) {
                menu.classList.toggle('hidden');
                arrow.classList.toggle('rotate-90');
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const currentPath = window.location.pathname.split("/").pop();
            
            // 1. DETEKSI JIKA HALAMAN AKTIF ADALAH MENU UTAMA/STANDAR (Dashboard, Scan Nota, dll)
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.remove('text-gray-600', 'hover:bg-gray-100');
                    link.classList.add('bg-[#39B54A]', 'text-white', 'shadow-sm');
                }
            });

            // 2. DETEKSI JIKA HALAMAN AKTIF ADALAH SUB-MENU (ANGGOTA)
            const subLinks = document.querySelectorAll('.nav-sub-item');
            subLinks.forEach(subLink => {
                if (subLink.getAttribute('href') === currentPath) {
                    // SET AKTIF HIJAU TUA FULL BACKGROUND PADA ANGGOTA
                    subLink.classList.remove('text-gray-500', 'hover:text-green-600');
                    subLink.classList.add('bg-[#0F5E27]', 'text-white', 'font-bold', 'shadow-sm');

                    // Cari container penampung dropdown (id^="menu-")
                    const parentContainer = subLink.closest('[id^="menu-"]');
                    if (parentContainer) {
                        parentContainer.classList.remove('hidden'); // Buka list dropdown otomatis
                        
                        const parentId = parentContainer.getAttribute('id');
                        
                        // Set tombol utama induknya di atas menjadi Hijau Terang Penuh
                        const btnId = parentId.replace('menu-', 'btn-');
                        const mainButton = document.getElementById(btnId);
                        if (mainButton) {
                            mainButton.classList.remove('text-gray-600', 'hover:bg-gray-100');
                            mainButton.classList.add('bg-[#39B54A]', 'text-white', 'shadow-sm');
                        }

                        // AMAN: Tangani dan munculkan kembali anak panah agar tidak hilang/hilang warna
                        const arrowId = parentId.replace('menu-', 'arrow-');
                        const arrowIcon = document.getElementById(arrowId);
                        if (arrowIcon) {
                            arrowIcon.classList.remove('text-gray-600');
                            arrowIcon.classList.add('rotate-90', 'text-white', 'opacity-100');
                        }
                    }
                }
            });
            
            // Sapaan Profil
            const nama = localStorage.getItem('user_nama_lengkap') || 'Adam Permana';
            const usernameElement = document.getElementById('sidebar-username');
            if (usernameElement) {
                usernameElement.innerText = "Hi, " + nama.split(" ")[0];
            }
        });

        // Fungsi Menampilkan Notifikasi dari LocalStorage
        document.addEventListener("DOMContentLoaded", function() {
            const nama = localStorage.getItem('user_nama_lengkap') || 'Adam Permana';
            document.getElementById('sidebar-username').innerText = "Hi, " + nama.split(" ")[0].toLowerCase();

            muatNotifikasi();
        });

        function muatNotifikasi() {
            const listContainer = document.getElementById('list-notifikasi');
            const daftarNotif = JSON.parse(localStorage.getItem('daftar_notifikasi')) || [];

            if(daftarNotif.length === 0) {
                listContainer.innerHTML = `<p class="text-gray-400 font-medium text-center py-4">Belum ada notifikasi baru.</p>`;
                return;
            }

            listContainer.innerHTML = "";
            daftarNotif.forEach(notif => {
                // Atur ikon & warna background berdasarkan tipe transaksi
                let bgIconClass = notif.tipe === 'keuangan_masuk' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600';
                let iconClass = notif.tipe === 'keuangan_masuk' ? 'fa-wallet' : 'fa-plus rotate-45';
                let bgContainerClass = notif.belumDibaca ? 'bg-green-50/40 border-green-100' : 'bg-white border-gray-100';
                let dotBelumDibaca = notif.belumDibaca ? '<div class="w-2 h-2 bg-green-500 rounded-full mt-2"></div>' : '';

                let itemHTML = `
                    <div class="flex items-start space-x-4 p-4 rounded-xl border ${bgContainerClass} relative transition">
                        <div class="p-3 ${bgIconClass} rounded-xl">
                            <i class="fa-solid ${iconClass} text-lg"></i>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-center">
                                <h4 class="font-bold text-gray-800 text-sm">${notif.judul}</h4>
                                <span class="text-xs text-gray-400 font-medium">${notif.waktu}</span>
                            </div>
                            <p class="text-gray-500 text-xs font-medium mt-1">${notif.pesan}</p>
                        </div>
                        ${dotBelumDibaca}
                    </div>
                `;
                listContainer.innerHTML += itemHTML;
            });
        }

        // Aksi menandai semua notifikasi telah dibaca
        function tandaiSemuaSelesai() {
            let daftarNotif = JSON.parse(localStorage.getItem('daftar_notifikasi')) || [];
            if(daftarNotif.length === 0) return;

            daftarNotif.forEach(notif => notif.belumDibaca = false);
            localStorage.setItem('daftar_notifikasi', JSON.stringify(daftarNotif));
            
            muatNotifikasi(); // Reload data tampilan
            alert("Semua notifikasi telah ditandai sebagai dibaca.");
        }
    </script>
